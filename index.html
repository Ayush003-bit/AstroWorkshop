
 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<title>Tarot Eagle Mastery Workshop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Jost", sans-serif;
}

body{
background:#f2f2f2;
padding:40px 15px;
display:flex;
justify-content:center;
}

.container{
max-width:900px;
width:100%;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.poster{
width:100%;
max-width:500px;
margin:auto;
display:block;
border-radius:10px;
}

.content{
margin-top:25px;
}

.details{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
}

.box{
background:#f7f7f7;
padding:10px 20px;
border-radius:6px;
font-weight:600;
}

.btn{
background:#e63946;
color:white;
padding:14px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
max-width:500px;
width:100%;
padding:30px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

label{
display:block;
margin-top:12px;
font-weight:600;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.qr{
text-align:center;
margin-top:20px;
}

.qr img{
width:200px;
}

.submit-btn{
width:100%;
margin-top:20px;
background:#2a9d8f;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<img src="Images/Workshop-Image.jpeg" class="poster">

<div class="content">

<h1>Tarot Eagle Mastery Workshop</h1>
<p>Explore your future with Tarot</p>

<div class="details">
<div class="box">15 March 2026</div>
<div class="box">Sunday | 1:00 PM</div>
<div class="box">₹51</div>
</div>

<button class="btn" onclick="openForm()">Register Now</button>

</div>

</div>


<!-- FORM MODAL -->

<div class="modal" id="formModal">

<div class="modal-content">

<span class="close" onclick="closeForm()">✖</span>

<h2>Tarot Eagle Mastery Workshop</h2>
<p>Explore your future with Tarot</p>

<form id="workshopForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Phone Number</label>
<input type="tel" id="phone" required>

<label>Email</label>
<input type="email" id="email" required>

<label>City</label>
<select id="city" required>
<option value="">Select City</option>
<option>Varanasi</option>
<option>Delhi</option>
<option>Mumbai</option>
<option>Lucknow</option>
<option>Other</option>
</select>

<div class="qr">

<p><b>Scan & Pay ₹51</b></p>

<img src="Images/Bar-Code.jpeg">

</div>

<label>Upload Payment Screenshot</label>
<input type="file" id="payment" accept="image/*" required>

<button type="submit" class="submit-btn">Submit</button>

</form>

</div>
</div>


<script>

function openForm(){
document.getElementById("formModal").style.display="flex";
}

function closeForm(){
document.getElementById("formModal").style.display="none";
}


document.getElementById("workshopForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;
let city=document.getElementById("city").value;
let payment=document.getElementById("payment").files[0];

if(!payment){
alert("Please upload payment screenshot");
return;
}

/* WhatsApp Message */

let message=`Workshop Registration

Name: ${name}
Phone: ${phone}
Email: ${email}
City: ${city}

Payment of Rs 51 is completed.

Successfully registered for the workshop.`;

let whatsappURL=`https://wa.me/917860513966?text=${encodeURIComponent(message)}`;

window.open(whatsappURL,"_blank");


/* PDF Download */

let text=`
Tarot Eagle Mastery Workshop

Name: ${name}
Phone: ${phone}
Email: ${email}
City: ${city}

Payment: Rs 51 Completed

You are successfully registered for the workshop.
`;

let blob=new Blob([text],{type:"application/pdf"});
let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="Workshop-Registration.pdf";
link.click();

alert("Registration Successful");

closeForm();

});

</script>

</body>
</html>
